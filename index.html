<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>A&G Assistant</title>
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased h-screen flex flex-col">

    <div class="bg-white shadow-sm p-4 flex justify-between items-center z-10 relative min-h-[60px]">
        <div class="flex-1 flex justify-start">
            <button id="headerBackBtn" class="text-blue-500 font-semibold flex items-center invisible">
                <span class="text-2xl mb-1 mr-1">&larr;</span> Back
            </button>
        </div>
        
        <span class="font-bold text-lg absolute left-1/2 transform -translate-x-1/2 whitespace-nowrap">A&G Assistant</span>
        
        <div class="flex-1 flex justify-end">
            <select id="userToggle" class="bg-gray-200 rounded px-2 py-1 text-sm font-semibold" onchange="handleUserChange()">
                <option value="Alex">Alex</option>
                <option value="Gen">Gen</option>
            </select>
        </div>
    </div>

    <div id="content" class="flex-1 overflow-y-auto p-4 pb-20">
        
        <div id="screen-categories">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold text-gray-500 uppercase text-sm">Categories</h2>
            </div>
            <div id="categoryList" class="bg-white rounded-xl shadow-sm divide-y divide-gray-100">
                <div class="p-4 text-center text-gray-400">Loading categories...</div>
            </div>
            
            <button onclick="openAddExercise()" class="fixed bottom-[104px] right-6 w-14 h-14 bg-orange-500 text-white rounded-full shadow-xl flex items-center justify-center text-4xl font-light pb-1 active:scale-95 transition-transform z-20">
                +
            </button>
        </div>

        <div id="screen-exercises" class="hidden">
            <div class="flex justify-between items-center mb-2">
                <h2 id="categoryTitle" class="font-bold text-gray-500 uppercase text-sm">Workouts</h2>
                <div class="flex items-center space-x-4">
                    <label class="flex items-center text-xs font-semibold text-gray-400 cursor-pointer">
                        <input type="checkbox" id="showInactiveCheck" onchange="openCategory(document.getElementById('categoryTitle').textContent)" class="mr-1"> Show Inactive
                    </label>
                </div>
            </div>
            <div id="exerciseList" class="bg-white rounded-xl shadow-sm divide-y divide-gray-100"></div>

            <button onclick="openAddExercise()" class="fixed bottom-[104px] right-6 w-14 h-14 bg-orange-500 text-white rounded-full shadow-xl flex items-center justify-center text-4xl font-light pb-1 active:scale-95 transition-transform z-20">
                +
            </button>
        </div>

        <div id="screen-logger" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <h1 id="loggerTitle" class="text-xl font-bold text-gray-900 truncate flex-1 text-left pt-2">Exercise</h1>
                <button onclick="editCurrentExercise()" class="text-gray-400 p-2 text-xl active:scale-95 transition-transform">✏️</button>
            </div>

            <img id="gifViewer" class="w-full max-h-48 object-contain bg-gray-50 rounded-xl mb-4 hidden" src="" alt="Exercise GIF">
            
            <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
                <div class="flex justify-between items-start cursor-pointer" onclick="toggleLoggerChart()">
                    <div class="flex-1 w-full">
                        <h3 class="font-bold text-gray-800 text-sm mb-3">Session History</h3>
                        <div class="mb-3">
                            <div class="text-sm"><span class="font-bold text-green-600 mr-2">Alex:</span><span id="lastSessionText_Alex" class="text-gray-600">Loading...</span></div>
                            <div id="prText_Alex" class="text-green-600 text-[10px] font-bold mt-0.5 hidden">Last increase: <span id="increaseDate_Alex"></span></div>
                        </div>
                        <div>
                            <div class="text-sm"><span class="font-bold text-pink-500 mr-2">Gen:</span><span id="lastSessionText_Gen" class="text-gray-600">Loading...</span></div>
                            <div id="prText_Gen" class="text-pink-500 text-[10px] font-bold mt-0.5 hidden">Last increase: <span id="increaseDate_Gen"></span></div>
                        </div>
                    </div>
                    <div id="chartToggleIcon" class="text-gray-400 text-2xl transition-transform duration-300 hidden">▾</div>
                </div>
                
                <div id="loggerChartContainer" class="hidden mt-4 pt-4 border-t border-gray-100 relative w-full h-32">
                    <canvas id="loggerChart"></canvas>
                </div>
            </div>

            <div class="flex bg-gray-200 p-1 rounded-lg mb-4">
                <button id="modeBtn_Alex" onclick="setLoggerMode('Alex')" class="flex-1 py-1 text-sm font-bold rounded-md text-gray-500 transition-all">Alex</button>
                <button id="modeBtn_Both" onclick="setLoggerMode('Both')" class="flex-1 py-1 text-sm font-bold rounded-md bg-white shadow-sm text-gray-800 transition-all">Both</button>
                <button id="modeBtn_Gen" onclick="setLoggerMode('Gen')" class="flex-1 py-1 text-sm font-bold rounded-md text-gray-500 transition-all">Gen</button>
            </div>

            <div id="card_Alex" class="bg-white p-4 rounded-xl shadow-sm mb-4 border-l-4 border-green-500">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-800 text-lg">Alex</h3>
                    <div class="flex items-center space-x-3">
                        <label class="flex items-center text-[10px] font-bold text-gray-500 uppercase cursor-pointer"><input type="checkbox" id="levelUpCheck_Alex" onchange="updateExerciseState('Alex', 'levelup', this.checked)" class="mr-1 w-4 h-4 accent-blue-600">🚀 Level Up</label>
                        <label class="flex items-center text-[10px] font-bold text-gray-500 uppercase cursor-pointer"><input type="checkbox" id="inactiveCheck_Alex" onchange="updateExerciseState('Alex', 'inactive', this.checked)" class="mr-1 w-4 h-4 accent-gray-500">💤 Inactive</label>
                    </div>
                </div>
                
                <div class="flex gap-3 w-full">
                    <div id="input-sets_Alex" class="hidden flex-1 min-w-0">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 truncate">Sets</label>
                        <input type="number" id="sets_Alex" class="w-full border-b-2 border-gray-100 p-1 text-xl font-semibold focus:outline-none focus:border-green-500 transition-colors text-center" placeholder="0">
                    </div>
                    <div id="input-reps_Alex" class="hidden flex-1 min-w-0">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 truncate">Reps</label>
                        <input type="number" id="reps_Alex" class="w-full border-b-2 border-gray-100 p-1 text-xl font-semibold focus:outline-none focus:border-green-500 transition-colors text-center" placeholder="0">
                    </div>
                    <div id="input-weight_Alex" class="hidden flex-1 min-w-0">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 truncate">Weight</label>
                        <input type="number" id="weight_Alex" step="0.5" class="w-full border-b-2 border-gray-100 p-1 text-xl font-semibold focus:outline-none focus:border-green-500 transition-colors text-center" placeholder="0">
                    </div>
                    <div id="input-time_Alex" class="hidden flex-1 min-w-0">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 truncate">Time</label>
                        <div class="flex items-center space-x-1">
                            <input type="number" id="time_Alex" class="w-full border-b-2 border-gray-100 p-1 text-xl font-semibold focus:outline-none focus:border-green-500 transition-colors min-w-0 text-center" placeholder="0">
                            <button id="timerBtn_Alex" onclick="toggleTimer('Alex')" class="bg-green-500 text-white px-2 py-1 rounded text-[9px] font-bold uppercase shrink-0">Start</button>
                            <button id="resetTimerBtn_Alex" onclick="resetTimer('Alex')" class="bg-gray-200 text-gray-600 px-2 py-1 rounded text-[9px] font-bold uppercase hidden shrink-0">Reset</button>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <input type="text" id="notes_Alex" class="w-full bg-gray-50 border border-gray-100 rounded-lg p-2 text-sm focus:outline-none focus:border-green-500 transition-colors" placeholder="Optional note...">
                </div>
                <div id="countdownDisplay_Alex" class="text-center text-4xl font-bold text-orange-500 mt-4 hidden"></div>
            </div>

            <div id="card_Gen" class="bg-white p-4 rounded-xl shadow-sm mb-4 border-l-4 border-pink-500">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-800 text-lg">Gen</h3>
                    <div class="flex items-center space-x-3">
                        <label class="flex items-center text-[10px] font-bold text-gray-500 uppercase cursor-pointer"><input type="checkbox" id="levelUpCheck_Gen" onchange="updateExerciseState('Gen', 'levelup', this.checked)" class="mr-1 w-4 h-4 accent-blue-600">🚀 Level Up</label>
                        <label class="flex items-center text-[10px] font-bold text-gray-500 uppercase cursor-pointer"><input type="checkbox" id="inactiveCheck_Gen" onchange="updateExerciseState('Gen', 'inactive', this.checked)" class="mr-1 w-4 h-4 accent-gray-500">💤 Inactive</label>
                    </div>
                </div>
                
                <div class="flex gap-3 w-full">
                    <div id="input-sets_Gen" class="hidden flex-1 min-w-0">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 truncate">Sets</label>
                        <input type="number" id="sets_Gen" class="w-full border-b-2 border-gray-100 p-1 text-xl font-semibold focus:outline-none focus:border-pink-500 transition-colors text-center" placeholder="0">
                    </div>
                    <div id="input-reps_Gen" class="hidden flex-1 min-w-0">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 truncate">Reps</label>
                        <input type="number" id="reps_Gen" class="w-full border-b-2 border-gray-100 p-1 text-xl font-semibold focus:outline-none focus:border-pink-500 transition-colors text-center" placeholder="0">
                    </div>
                    <div id="input-weight_Gen" class="hidden flex-1 min-w-0">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 truncate">Weight</label>
                        <input type="number" id="weight_Gen" step="0.5" class="w-full border-b-2 border-gray-100 p-1 text-xl font-semibold focus:outline-none focus:border-pink-500 transition-colors text-center" placeholder="0">
                    </div>
                    <div id="input-time_Gen" class="hidden flex-1 min-w-0">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 truncate">Time</label>
                        <div class="flex items-center space-x-1">
                            <input type="number" id="time_Gen" class="w-full border-b-2 border-gray-100 p-1 text-xl font-semibold focus:outline-none focus:border-pink-500 transition-colors min-w-0 text-center" placeholder="0">
                            <button id="timerBtn_Gen" onclick="toggleTimer('Gen')" class="bg-green-500 text-white px-2 py-1 rounded text-[9px] font-bold uppercase shrink-0">Start</button>
                            <button id="resetTimerBtn_Gen" onclick="resetTimer('Gen')" class="bg-gray-200 text-gray-600 px-2 py-1 rounded text-[9px] font-bold uppercase hidden shrink-0">Reset</button>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <input type="text" id="notes_Gen" class="w-full bg-gray-50 border border-gray-100 rounded-lg p-2 text-sm focus:outline-none focus:border-pink-500 transition-colors" placeholder="Optional note...">
                </div>
                <div id="countdownDisplay_Gen" class="text-center text-4xl font-bold text-orange-500 mt-4 hidden"></div>
            </div>

            <div class="h-16"></div>
            <div class="fixed bottom-[96px] left-4 right-4 z-20">
                <button id="submitBtn" onclick="submitWorkout()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-xl transition-all duration-150 active:scale-95 active:bg-blue-800 active:shadow-sm">
                    Log Workout
                </button>
            </div>
        </div>

        <div id="screen-history" class="hidden">
            <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
                <select id="historyExerciseToggle" class="w-full bg-gray-100 rounded p-2 mb-2 text-sm font-semibold" onchange="renderChart()">
                    <option value="">Select an exercise for chart...</option>
                </select>
                
                <div id="chartContainer" class="relative w-full h-48 hidden mt-2">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        
            <h2 class="font-bold text-gray-500 mb-2 uppercase text-sm">Recent Logs</h2>
            <div id="historyList" class="bg-white rounded-xl shadow-sm divide-y divide-gray-100"></div>
        </div>

        <div id="screen-add-exercise" class="hidden">
            <h1 id="addEditExTitle" class="text-2xl font-bold text-orange-600 mb-4 pt-2">New Exercise</h1>
            
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Exercise Name</label>
                    <input type="text" id="newExName" class="w-full border-b border-gray-200 p-2 text-lg focus:outline-none" placeholder="e.g. Hammer Curls">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Category</label>
                    <select id="newExCategory" class="w-full border-b border-gray-200 p-2 text-lg focus:outline-none bg-white"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Track These Units:</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex items-center space-x-2 p-2 border rounded text-sm cursor-pointer">
                            <input type="checkbox" value="sets" class="unit-check"> <span>Sets</span>
                        </label>
                        <label class="flex items-center space-x-2 p-2 border rounded text-sm cursor-pointer">
                            <input type="checkbox" value="reps" class="unit-check"> <span>Reps</span>
                        </label>
                        <label class="flex items-center space-x-2 p-2 border rounded text-sm cursor-pointer">
                            <input type="checkbox" value="weight" class="unit-check"> <span>Weight</span>
                        </label>
                        <label class="flex items-center space-x-2 p-2 border rounded text-sm cursor-pointer">
                            <input type="checkbox" value="time" class="unit-check"> <span>Time</span>
                        </label>
                    </div>
                </div>
            </div>

            <button id="addExBtn" onclick="saveExerciseConfig()" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl mt-6 shadow-lg active:scale-95 transition-transform">
                Save to Exercises
            </button>
        </div>

    </div>

    <div class="bg-white border-t border-gray-200 flex justify-around p-3 pb-8 fixed bottom-0 left-0 w-full z-10">
        <button onclick="showScreen('categories')" class="flex flex-col items-center text-blue-600 w-1/2">
            <span class="text-2xl">🏃</span>
            <span class="text-xs font-semibold mt-1">Workout</span>
        </button>
        <button onclick="showScreen('history')" class="flex flex-col items-center text-gray-400 w-1/2" id="tabHistory">
            <span class="text-2xl">🕒</span>
            <span class="text-xs font-semibold mt-1">History</span>
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzpfaP9gXYvAIA9CVeydWT5u8wjZAHtl_LUXZJSJHhyJF07Ft2UbVnDsjEAzJ1QBYRM/exec";
        
        let exercises = [];
        let historyData = [];
        let categories = [];
        let currentExercise = null;
        let editingExerciseId = null;
        let timerIntervals = { Alex: null, Gen: null };
        let countdownValues = { Alex: 0, Gen: 0 };
        let progressChartInstance = null;
        let loggerChartInstance = null;
        const dingSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");

        async function googleFetch(payload) {
            return await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
        }

        async function init() {
            await Promise.all([fetchExercises(), fetchHistory()]);
            renderCategories();
        }

        async function fetchExercises() {
            const res = await fetch(`${API_URL}?sheet=Exercises`, { cache: 'no-store' });
            exercises = await res.json();
            categories = [...new Set(exercises.map(ex => ex.category))].sort();
        }

        async function fetchHistory() {
            const res = await fetch(`${API_URL}?sheet=Logs`, { cache: 'no-store' });
            let rawData = await res.json();
            
            rawData = rawData.map(log => {
                let d;
                if (log.date && log.date.includes('T')) {
                    d = new Date(log.date);
                } else if (log.date && log.date.includes('/')) {
                    const parts = log.date.split('/');
                    d = new Date(parts[2], parts[1] - 1, parts[0]);
                } else {
                    d = new Date(log.date);
                }
                
                log.timestamp = d.getTime();
                
                if (!isNaN(log.timestamp)) {
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = d.getFullYear();
                    const hours = String(d.getHours()).padStart(2, '0');
                    const mins = String(d.getMinutes()).padStart(2, '0');
                    
                    log.displayDate = log.date.includes('T') ? `${day}/${month}/${year} ${hours}:${mins}` : `${day}/${month}/${year}`;
                    log.justDate = `${day}/${month}/${year}`; 
                } else {
                    log.displayDate = log.date;
                    log.justDate = log.date;
                }
                return log;
            });

            historyData = rawData.sort((a, b) => b.timestamp - a.timestamp);
        
            populateHistoryDropdown();
            renderHistory();
            renderChart();
        }

        function showScreen(screen) {
            ['categories', 'exercises', 'logger', 'history', 'add-exercise'].forEach(s => {
                document.getElementById(`screen-${s}`).classList.add('hidden');
            });
            document.getElementById(`screen-${screen}`).classList.remove('hidden');
            
            const backBtn = document.getElementById('headerBackBtn');
            backBtn.classList.remove('hidden', 'invisible');
            
            if (screen === 'exercises') {
                backBtn.onclick = () => showScreen('categories');
            } else if (screen === 'logger') {
                backBtn.onclick = () => showScreen('exercises');
            } else if (screen === 'add-exercise') {
                backBtn.onclick = () => {
                    if (editingExerciseId) {
                        showScreen('logger');
                    } else {
                        showScreen('categories');
                    }
                };
            } else {
                backBtn.classList.add('invisible'); 
            }

            const userToggle = document.getElementById('userToggle');
            if (screen === 'logger') {
                userToggle.classList.add('invisible');
            } else {
                userToggle.classList.remove('invisible', 'hidden');
            }

            document.querySelectorAll('.fixed.bottom-0 button').forEach(btn => btn.classList.replace('text-blue-600', 'text-gray-400'));
            if(['categories', 'exercises', 'logger', 'add-exercise'].includes(screen)) {
                document.querySelectorAll('.fixed.bottom-0 button')[0].classList.replace('text-gray-400', 'text-blue-600');
            }
            if(screen === 'history') document.querySelectorAll('.fixed.bottom-0 button')[1].classList.replace('text-gray-400', 'text-blue-600');
        }

        function handleUserChange() {
            renderHistory();
            renderChart();
            if (!document.getElementById('screen-exercises').classList.contains('hidden')) {
                openCategory(document.getElementById('categoryTitle').textContent);
            }
        }

        function renderCategories() {
            const list = document.getElementById('categoryList');
            const dropdown = document.getElementById('newExCategory');
        
            list.innerHTML = categories.map(cat => `
                <div onclick='openCategory("${cat}")' class="p-4 flex justify-between items-center cursor-pointer active:bg-gray-50">
                    <span class="font-bold text-gray-800">${cat}</span>
                    <span class="text-gray-300">&rang;</span>
                </div>
            `).join('');
        
            dropdown.innerHTML = categories.map(cat => `
                <option value="${cat}">${cat}</option>
            `).join('');
        }
        
        function openCategory(category) {
            document.getElementById('categoryTitle').innerText = category;
            renderExerciseList(category);
            showScreen('exercises');
        }

        function renderExerciseList(category) {
            const list = document.getElementById('exerciseList');
            const user = document.getElementById('userToggle').value;
            const userLower = user.toLowerCase();
            const showInactive = document.getElementById('showInactiveCheck').checked;
            
            const filtered = exercises.filter(ex => ex.category === category);
            
            const todayD = new Date();
            const todayStr = `${String(todayD.getDate()).padStart(2, '0')}/${String(todayD.getMonth() + 1).padStart(2, '0')}/${todayD.getFullYear()}`;

            const htmlOutput = filtered.map(ex => {
                const inactiveKey = Object.keys(ex).find(k => k.toLowerCase() === `inactive_${userLower}`);
                const readyKey = Object.keys(ex).find(k => k.toLowerCase() === `levelup_${userLower}`);

                const isInactive = inactiveKey ? String(ex[inactiveKey]).trim().toLowerCase() === 'true' : false;
                const isReady = readyKey ? String(ex[readyKey]).trim().toLowerCase() === 'true' : false;
                
                const loggedToday = historyData.some(log => log.exercise_name === ex.name && log.user_name === user && log.justDate === todayStr);

                if (isInactive && !showInactive) return '';

                const readyBadge = isReady && !loggedToday ? `<span class="ml-2 text-[10px] bg-orange-100 text-orange-800 px-2 py-1 rounded-full font-bold uppercase tracking-wider">Up Next 🚀</span>` : '';
                const inactiveBadge = isInactive ? `<span class="ml-2 text-[10px] bg-gray-200 text-gray-600 px-2 py-1 rounded-full font-bold uppercase tracking-wider">Inactive 💤</span>` : '';
                const doneBadge = loggedToday ? `<span class="ml-2 text-[10px] bg-green-100 text-green-800 px-2 py-1 rounded-full font-bold uppercase tracking-wider">Done ✓</span>` : '';
                
                const opacityClass = (isInactive || loggedToday) ? 'opacity-40 grayscale' : '';

                return `
                <div onclick='openLogger(${JSON.stringify(ex).replace(/'/g, "&apos;")})' class="p-4 flex justify-between items-center cursor-pointer active:bg-gray-50 ${opacityClass}">
                    <div class="flex items-center">
                        <span class="font-bold text-gray-800">${ex.name}</span>
                        ${doneBadge}
                        ${readyBadge}
                        ${inactiveBadge}
                    </div>
                    <span class="text-gray-300">&rang;</span>
                </div>
                `;
            }).join('');

            list.innerHTML = htmlOutput || '<div class="p-4 text-center text-gray-400">No active exercises.</div>';
        }
        
        function renderHistory() {
            const user = document.getElementById('userToggle').value;
            const selectedExercise = document.getElementById('historyExerciseToggle').value;
            const list = document.getElementById('historyList');
            
            const filtered = historyData.filter(log => {
                const matchesUser = log.user_name === user;
                const matchesExercise = !selectedExercise || log.exercise_name === selectedExercise;
                return matchesUser && matchesExercise;
            });
            
            if (filtered.length === 0) return list.innerHTML = '<div class="p-4 text-center text-gray-400">No logs found.</div>';
            
            list.innerHTML = filtered.map(log => `
                <div class="p-4 flex justify-between items-center group">
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-1 mr-4">
                            <span class="font-bold text-gray-800">${log.exercise_name}</span>
                            <span class="text-xs px-2 py-1 rounded bg-${log.user_name === 'Alex' ? 'green' : 'pink'}-100 text-${log.user_name === 'Alex' ? 'green' : 'pink'}-800 font-bold">${log.user_name}</span>
                        </div>
                        <div class="text-sm text-gray-600">${[log.sets ? log.sets+' Sets' : '', log.reps ? log.reps+' Reps' : '', log.weight ? log.weight+'kg' : '', log.time ? log.time+'s' : ''].filter(Boolean).join(' × ')}</div>
                        ${log.notes ? `<div class="text-xs text-gray-500 italic mt-1">"${log.notes}"</div>` : ''}
                        
                        <div class="text-xs mt-2 flex items-center space-x-2">
                            <span class="text-gray-400">${log.displayDate}</span>
                            ${log.category ? `<span class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">${log.category}</span>` : ''}
                        </div>
                    </div>
                    <button onclick="deleteLog('${log.id}')" class="text-red-400 hover:text-red-600 p-2 text-xl">
                        🗑️
                    </button>
                </div>
            `).join('');
        }

        function populateHistoryDropdown() {
            const dropdown = document.getElementById('historyExerciseToggle');
            const uniqueExercises = [...new Set(historyData.map(log => log.exercise_name))].sort();
            dropdown.innerHTML = '<option value="">Select an exercise for chart...</option>' + 
                uniqueExercises.map(ex => `<option value="${ex}">${ex}</option>`).join('');
        }

        function renderChart() {
            const user = document.getElementById('userToggle').value;
            const exerciseName = document.getElementById('historyExerciseToggle').value;
            const canvas = document.getElementById('progressChart');
            const container = document.getElementById('chartContainer');
            
            renderHistory();
            
            if (!exerciseName) {
                container.classList.add('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            const chartLogs = historyData.filter(log => log.exercise_name === exerciseName && log.user_name === user).reverse();
            const labels = chartLogs.map(log => log.displayDate);
            const data = chartLogs.map(log => parseFloat(log.weight) || parseFloat(log.time) || 0);
            
            if (progressChartInstance) progressChartInstance.destroy();
            
            progressChartInstance = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: exerciseName,
                        data: data,
                        borderColor: user === 'Alex' ? '#10B981' : '#EC4899', 
                        backgroundColor: user === 'Alex' ? '#D1FAE5' : '#FCE7F3',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function setLoggerMode(mode) {
            ['Alex', 'Both', 'Gen'].forEach(m => {
                const btn = document.getElementById(`modeBtn_${m}`);
                if (m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                    btn.classList.remove('text-gray-500');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
                    btn.classList.add('text-gray-500');
                }
            });

            document.getElementById('card_Alex').classList.toggle('hidden', mode === 'Gen');
            document.getElementById('card_Gen').classList.toggle('hidden', mode === 'Alex');
        }

        function openLogger(ex) {
            setLoggerMode('Both');
            resetTimer('Alex'); 
            resetTimer('Gen'); 
            currentExercise = ex;
            document.getElementById('loggerTitle').innerText = ex.name;
            
            document.getElementById('loggerChartContainer').classList.add('hidden');
            document.getElementById('chartToggleIcon').style.transform = 'rotate(0deg)';
            
            const gif = document.getElementById('gifViewer');
            if(ex.gif_url) { gif.src = ex.gif_url; gif.classList.remove('hidden'); }
            else { gif.classList.add('hidden'); }

            const units = ex.units ? ex.units.toLowerCase() : "sets,reps,weight";
            const isCardio = ex.category === "Cardio";
            
            ['sets', 'reps', 'weight', 'time'].forEach(u => {
                const show = units.includes(u);
                ['Alex', 'Gen'].forEach(user => {
                    const container = document.getElementById(`input-${u}_${user}`);
                    container.classList.toggle('hidden', !show);
                    if (u === 'time') container.querySelector('label').innerText = isCardio ? "Time (minutes)" : "Time (seconds)";
                });
            });

            loadData();
            showScreen('logger');
        }

        function loadData() {
            if(!currentExercise) return;
            const units = currentExercise.units ? currentExercise.units.toLowerCase() : "";

            ['Alex', 'Gen'].forEach(user => {
                const userLogs = historyData.filter(l => l.exercise_name === currentExercise.name && l.user_name === user);
                const last = userLogs[0];
            
                if(last) {
                    document.getElementById(`sets_${user}`).value = last.sets || '';
                    document.getElementById(`reps_${user}`).value = last.reps || '';
                    document.getElementById(`weight_${user}`).value = last.weight || '';
                    document.getElementById(`time_${user}`).value = last.time || '';
                    
                    let details = [
                        last.sets ? last.sets+' Sets' : '', 
                        last.reps ? last.reps+' Reps' : '', 
                        last.weight ? last.weight+'kg' : '', 
                        last.time ? (currentExercise.category === "Cardio" ? last.time+'m' : last.time+'s') : ''
                    ].filter(Boolean).join(' × ');
            
                    // Updated to justDate without timestamp
                    document.getElementById(`lastSessionText_${user}`).innerHTML = `${last.justDate}: ${details}`;

                    // Re-add PR Tracking
                    let incDate = null;
                    for(let i=0; i<userLogs.length-1; i++) {
                        let increased = false;
                        if (units.includes('weight')) increased = parseFloat(userLogs[i].weight) > parseFloat(userLogs[i+1].weight);
                        else if (units.includes('time')) increased = parseFloat(userLogs[i].time) > parseFloat(userLogs[i+1].time);
                        else if (units.includes('reps')) increased = parseFloat(userLogs[i].reps) > parseFloat(userLogs[i+1].reps);
                        
                        if(increased) { incDate = userLogs[i].justDate; break; }
                    }
            
                    const prText = document.getElementById(`prText_${user}`);
                    if(incDate) { 
                        prText.classList.remove('hidden'); 
                        document.getElementById(`increaseDate_${user}`).innerText = incDate; 
                    } else { 
                        prText.classList.add('hidden'); 
                    }
                } else {
                    ['sets', 'reps', 'weight', 'time', 'notes'].forEach(id => document.getElementById(`${id}_${user}`).value = '');
                    document.getElementById(`lastSessionText_${user}`).innerText = "No previous data.";
                    document.getElementById(`prText_${user}`).classList.add('hidden');
                }

                const userLower = user.toLowerCase();
                const readyKey = Object.keys(currentExercise).find(k => k.toLowerCase() === `levelup_${userLower}`);
                const inactiveKey = Object.keys(currentExercise).find(k => k.toLowerCase() === `inactive_${userLower}`);

                const isReady = readyKey ? String(currentExercise[readyKey]).trim().toLowerCase() === 'true' : false;
                const isInactive = inactiveKey ? String(currentExercise[inactiveKey]).trim().toLowerCase() === 'true' : false;

                document.getElementById(`levelUpCheck_${user}`).checked = isReady;
                document.getElementById(`inactiveCheck_${user}`).checked = isInactive;
            });

            renderLoggerChart();
        }

        function toggleLoggerChart() {
            const container = document.getElementById('loggerChartContainer');
            const icon = document.getElementById('chartToggleIcon');
            if (icon.classList.contains('hidden')) return;

            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
                if (loggerChartInstance) loggerChartInstance.resize(); 
            } else {
                container.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function renderLoggerChart() {
            if (!currentExercise) return;
            const canvas = document.getElementById('loggerChart');
            const icon = document.getElementById('chartToggleIcon');
            
            const exerciseLogs = historyData.filter(log => log.exercise_name === currentExercise.name).reverse();
            const alexLogs = exerciseLogs.filter(log => log.user_name === 'Alex');
            const genLogs = exerciseLogs.filter(log => log.user_name === 'Gen');
            
            if (alexLogs.length < 2 && genLogs.length < 2) {
                icon.classList.add('hidden');
                return;
            }
            
            icon.classList.remove('hidden');
            const uniqueDates = [...new Set(exerciseLogs.map(log => log.displayDate))];
            
            const mapData = (userLogs) => {
                return uniqueDates.map(date => {
                    const log = userLogs.find(l => l.displayDate === date);
                    return log ? (parseFloat(log.weight) || parseFloat(log.time) || parseFloat(log.reps) || 0) : null;
                });
            };
            
            if (loggerChartInstance) loggerChartInstance.destroy();
            
            loggerChartInstance = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: uniqueDates,
                    datasets: [
                        {
                            label: 'Alex',
                            data: mapData(alexLogs),
                            borderColor: '#10B981', 
                            backgroundColor: '#D1FAE5',
                            tension: 0.4,
                            spanGaps: true, 
                            pointRadius: 3
                        },
                        {
                            label: 'Gen',
                            data: mapData(genLogs),
                            borderColor: '#EC4899', 
                            backgroundColor: '#FCE7F3',
                            tension: 0.4,
                            spanGaps: true, 
                            pointRadius: 3
                        }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: true, labels: { boxWidth: 10, usePointStyle: true, font: { size: 10 } } } 
                    },
                    scales: {
                        x: { display: true, ticks: { maxTicksLimit: 5 } }, 
                        y: { display: true, ticks: { maxTicksLimit: 4 } }
                    }
                }
            });
        }

        function toggleTimer(user) {
            const btn = document.getElementById(`timerBtn_${user}`);
            const resetBtn = document.getElementById(`resetTimerBtn_${user}`);
            const display = document.getElementById(`countdownDisplay_${user}`);
            const isCardio = currentExercise.category === "Cardio";
            
            const updateDisplay = () => {
                const m = Math.floor(countdownValues[user] / 60);
                const s = countdownValues[user] % 60;
                display.innerText = (isCardio || m > 0) ? `${m}:${s.toString().padStart(2, '0')}` : countdownValues[user];
            };

            if (timerIntervals[user]) {
                clearInterval(timerIntervals[user]);
                timerIntervals[user] = null;
                btn.innerText = "Resume";
                btn.className = "text-white px-3 py-1 rounded-lg text-[9px] font-bold uppercase w-16 text-center transition-colors bg-yellow-500 shrink-0";
            } else {
                if (countdownValues[user] <= 0 || display.classList.contains('hidden')) {
                    let rawValue = parseInt(document.getElementById(`time_${user}`).value) || 0;
                    countdownValues[user] = isCardio ? rawValue * 60 : rawValue; 
                    if(countdownValues[user] <= 0) return;   
                    
                    display.classList.remove('hidden');
                    display.classList.remove('text-red-500');
                    display.classList.add('text-orange-500');
                    resetBtn.classList.remove('hidden');
                }
                
                updateDisplay();
                btn.innerText = "Pause";
                btn.className = "text-white px-3 py-1 rounded-lg text-[9px] font-bold uppercase w-16 text-center transition-colors bg-red-500 shrink-0";

                timerIntervals[user] = setInterval(() => {
                    countdownValues[user]--;
                    updateDisplay();
                    
                    if(countdownValues[user] <= 5) display.classList.replace('text-orange-500', 'text-red-500');
                    
                    if(countdownValues[user] <= 0) {
                        resetTimer(user);
                        dingSound.play().catch(e => console.log("Audio play prevented by browser"));
                    }
                }, 1000);
            }
        }

        function resetTimer(user) {
            const btn = document.getElementById(`timerBtn_${user}`);
            const resetBtn = document.getElementById(`resetTimerBtn_${user}`);
            const display = document.getElementById(`countdownDisplay_${user}`);
            
            if (timerIntervals[user]) {
                clearInterval(timerIntervals[user]);
                timerIntervals[user] = null;
            }
            countdownValues[user] = 0;
            display.classList.add('hidden');
            
            btn.innerText = "Start";
            btn.className = "text-white px-3 py-1 rounded-lg text-[9px] font-bold uppercase w-16 text-center transition-colors bg-green-500 shrink-0";
            resetBtn.classList.add('hidden');
        }

        async function submitWorkout() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Saving...";
            btn.disabled = true;
        
            const units = currentExercise.units ? currentExercise.units.toLowerCase() : "";
            let savedAny = false;
            let showConfetti = false;

            for (const user of ['Alex', 'Gen']) {
                const weightVal = parseFloat(document.getElementById(`weight_${user}`).value) || 0;
                const repsVal = parseFloat(document.getElementById(`reps_${user}`).value) || 0;
                const timeVal = parseFloat(document.getElementById(`time_${user}`).value) || 0;
                const setsVal = parseFloat(document.getElementById(`sets_${user}`).value) || 0;
                const notesVal = document.getElementById(`notes_${user}`).value.trim();

                if (!weightVal && !repsVal && !timeVal && !setsVal && !notesVal) continue;

                const userLogs = historyData.filter(l => l.exercise_name === currentExercise.name && l.user_name === user);
                const recentlyLogged = userLogs.some(l => (new Date().getTime() - l.timestamp) < 120000);
                if (recentlyLogged) {
                    if (!confirm(`${user} just logged this less than 2 mins ago. Are you sure you want to log it again?`)) continue; 
                }

                savedAny = true;
                const bestWeight = Math.max(0, ...userLogs.map(l => parseFloat(l.weight) || 0));
                const bestReps = Math.max(0, ...userLogs.map(l => parseFloat(l.reps) || 0));
                const bestTime = Math.max(0, ...userLogs.map(l => parseFloat(l.time) || 0));
            
                let isPR = false;
                if (units.includes('weight') && weightVal > 0) isPR = weightVal > bestWeight && bestWeight > 0;
                else if (units.includes('time') && timeVal > 0) isPR = timeVal > bestTime && bestTime > 0;
                else if (units.includes('reps') && repsVal > 0) isPR = repsVal > bestReps && bestReps > 0;
            
                if (isPR) showConfetti = true;

                const log = {
                    id: crypto.randomUUID(),
                    exercise_name: currentExercise.name,
                    category: currentExercise.category,
                    user_name: user,
                    date: new Date().toISOString(), 
                    sets: document.getElementById(`sets_${user}`).value,
                    reps: document.getElementById(`reps_${user}`).value,
                    weight: document.getElementById(`weight_${user}`).value,
                    time: document.getElementById(`time_${user}`).value,
                    notes: notesVal
                };
            
                const todayD = new Date();
                log.timestamp = todayD.getTime();
                log.justDate = `${String(todayD.getDate()).padStart(2, '0')}/${String(todayD.getMonth() + 1).padStart(2, '0')}/${todayD.getFullYear()}`;
                log.displayDate = log.justDate; 
                historyData.unshift(log);

                try {
                    googleFetch({ method: "POST", sheet: "Logs", data: log });
                    
                    if (isPR) {
                        const exactLevelUpKey = Object.keys(currentExercise).find(k => k.toLowerCase() === `levelup_${user.toLowerCase()}`);
                        if (exactLevelUpKey) {
                            googleFetch({
                                method: "PATCH", sheet: "Exercises", id: currentExercise.id,
                                data: { [exactLevelUpKey]: "false" }
                            });
                        }
                    }
                } catch (err) { 
                    console.error(`Failed to save log for ${user}.`); 
                }
            }

            if (!savedAny) {
                alert("Please enter stats for at least one person.");
                btn.innerText = "Log Workout";
                btn.disabled = false;
                return;
            }
            
            btn.innerText = "Saved! ✅";
            btn.classList.replace('bg-blue-600', 'bg-green-500');
            
            if (currentExercise && currentExercise.category) {
                renderExerciseList(currentExercise.category);
            }

            if (showConfetti) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#10B981', '#EC4899', '#ffffff'] });
                await new Promise(r => setTimeout(r, 2000));
            } else {
                await new Promise(r => setTimeout(r, 1000));
            }
    
            ['Alex', 'Gen'].forEach(user => {
                ['sets', 'reps', 'weight', 'time', 'notes'].forEach(u => document.getElementById(`${u}_${user}`).value = '');
            });

            fetchHistory().then(() => loadData());
            fetchExercises();
            
            btn.innerText = "Log Workout";
            btn.classList.replace('bg-green-500', 'bg-blue-600');
            btn.disabled = false;
        }
        
        async function deleteLog(logId) {
            if (!confirm("Are you sure you want to delete this log?")) return;

            try {
                await googleFetch({ method: "DELETE", sheet: "Logs", id: logId });
                await fetchHistory();
            } catch (err) {
                alert("Failed to delete log.");
            }
        }

        async function updateExerciseState(user, type, isChecked) {
            const userLower = user.toLowerCase();
            const exactColumnName = Object.keys(currentExercise).find(k => k.toLowerCase() === `${type}_${userLower}`); 

            if (exactColumnName) {
                currentExercise[exactColumnName] = isChecked ? "true" : "false";
                try {
                    await googleFetch({
                        method: "PATCH", sheet: "Exercises", id: currentExercise.id,
                        data: { [exactColumnName]: isChecked ? "true" : "false" }
                    });
                    
                    await fetchExercises();
                    currentExercise = exercises.find(ex => ex.id === currentExercise.id) || currentExercise;
                    
                    if (currentExercise && currentExercise.category) {
                        renderExerciseList(currentExercise.category);
                    }
                } catch (err) {
                    console.error("Failed to sync with Google Sheets:", err);
                }
            }
        }

        function openAddExercise() {
            editingExerciseId = null;
            document.getElementById('newExName').value = "";
            document.getElementById('newExCategory').value = categories[0] || "";
            document.querySelectorAll('.unit-check').forEach(cb => cb.checked = ['sets', 'reps', 'weight'].includes(cb.value));
            
            document.getElementById('addEditExTitle').innerText = "New Exercise";
            document.getElementById('addExBtn').innerText = "Save to Exercises";
            
            showScreen('add-exercise');
        }

        function editCurrentExercise() {
            editingExerciseId = currentExercise.id;
            document.getElementById('newExName').value = currentExercise.name;
            document.getElementById('newExCategory').value = currentExercise.category;
            
            const units = currentExercise.units ? currentExercise.units.toLowerCase() : "";
            document.querySelectorAll('.unit-check').forEach(cb => {
                cb.checked = units.includes(cb.value);
            });

            document.getElementById('addEditExTitle').innerText = "Edit Exercise";
            document.getElementById('addExBtn').innerText = "Save Changes";
            
            showScreen('add-exercise');
        }

        async function saveExerciseConfig() {
            const btn = document.getElementById('addExBtn');
            const name = document.getElementById('newExName').value;
            const category = document.getElementById('newExCategory').value;
            const selectedUnits = Array.from(document.querySelectorAll('.unit-check:checked')).map(cb => cb.value).join(',');

            if (!name) return alert("Please enter a name.");

            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                if (editingExerciseId) {
                    await googleFetch({ 
                        method: "PATCH", sheet: "Exercises", id: editingExerciseId,
                        data: { name: name, category: category, units: selectedUnits } 
                    });
                    alert(`${name} updated!`);
                    
                    if (currentExercise && currentExercise.id === editingExerciseId) {
                        currentExercise.name = name;
                        currentExercise.category = category;
                        currentExercise.units = selectedUnits;
                        document.getElementById('loggerTitle').innerText = name;
                    }
                } else {
                    const newExercise = {
                        id: crypto.randomUUID(), name: name, category: category, units: selectedUnits, gif_url: ""
                    };
                    await googleFetch({ method: "POST", sheet: "Exercises", data: newExercise });
                    alert(`${name} added!`);
                }

                await fetchExercises(); 
                renderCategories(); 
                
                if (editingExerciseId) {
                    showScreen('logger');
                    loadData(); 
                } else {
                    showScreen('categories');
                }
            } catch (err) {
                alert("Error saving exercise.");
            }

            btn.innerText = "Save";
            btn.disabled = false;
        }

        init(); 
    </script>
